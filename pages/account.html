<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Information</title>
    <link rel="stylesheet" href="Accountinfo.css">
</head>
<body>
    <div class="container">
        <h1>My Account</h1>
        <div class="Details">
            <h1>Account details</h1>
            <h2>Full name</h2>
            <input type="text" class="input" value="Your Name">
            <h2>Birthday</h2>
            <input type="text" class="input" value="Your Birthday">
            <h2>Email</h2>
            <input type="text" class="input" value="Your Email">
            <h2>Phone Number</h2>
            <input type="text" class="input" value="Your Phone number">    
            <h2>Password</h2>
            <input type="password" class="input" value="password">
            <button class="Button">Save changes</button>
        </div>
        <div class="Payment">
            <h1>Payment details</h1>
            <h2>Card Number</h2>
            <input type="text" class="input" value="Card Number">
            <h2>Billing Address</h2>
            <input type="text" class="input" value="Your Address">
            <h2>Zipcode</h2>
            <input type="text" class="input" value="Your Zipcode">
            <h2>Card expiration date</h2>
            <input type="text" class="input" value="Your card expiration date">
            <h2>Cvv number</h2>
            <input type="password" class="input" value="Your cvv">
            <button class="Button">Save changes</button>
        </div>
    </div>    
</body>
</html>
