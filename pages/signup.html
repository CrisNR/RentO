<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>RentO: Sign Up</title>
    <link rel="stylesheet" href="../css/signup.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"/>
    <script src="../scripts/signup.js" defer></script>
  </head>
  <body>
    
    <div class="header">
      <div class = "header-center">
        <h1><a href = "index.html" title = "Homepage of RentO" class = "home-link">RentO</a></h1>
        <h2>Sign Up</h2>
      </div>
    </div>
    
    <div class = "main">
      <form name ="sign-up" action = "/action_page.php" onsubmit = "return validateForm()" method = "post" required>
        
        <label for = "fname"><bold>First Name</bold></label><br>
        <input type = "text" id = "fname" name = "fname" placeholder = "John"><br><br>
        
        <label for = "lname"><bold>Last Name</bold></label><br>
        <input type = "text" id = "lname" name = "lname" placeholder = "Bradshaw"><br><br>
        
        <label for = "email"><bold>Email Address</bold></label><br>
        <input type = "text" id = "email" name = "email" placeholder = "Ex. johnbradshaw@rento.com"><br><br>
        
        <label for = "password">Password</label><br>
        <input type = "password" id = "password" name = "password"><br>
        <p class = "create-password">Password must be at least 6  characters.</p>
        <label for = "re-enterpassword">Re-enter password</label><br>
        <input type = "password" id = "re-enterpassword" name = "re-enterpassword"><br><br>

        
        <input type = "submit" value = "Create" class = "create-button">
        <br><span class = "agree">By creating an account, you agree to RentO's <br><a href="terms.html" title="Terms and Policies">Terms &amp; Policies</a> and <a href="privacy.html" title="Privacy Policy">Privacy Policy</a>.</span>
        <br><span class = "agree"><br>Already have an account? <a href="signin.html" title="Sign In">Sign In!</a></span>
      </form>
    </div>
    
    <footer class="footer">
      <div></div>
      <div>
        <span>&copy;</span>2022 RentO.com LLC
      </div>
      
      <div class = "link">
        <a href="terms.html" title="Terms and Policies" class = "terms">Terms &amp; Policies</a>
      </div>
      
      <div class = "link">
        <a href="privacy.html" title="Privacy Policy" class = "policies">Privacy Policy</a>
      </div>
      <div></div>
      
    </footer>
  </body>
</html>
