<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>RentO: Sign In</title>
    <link rel="stylesheet" type = "text/css" href="../css/signin.css" defer/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"/>
    <script src="../scripts/signin.js" defer></script>
  </head>
  <body>
    
    <div class="header">
      <div class = "header-center">
        <h1><a href = "index.html" title = "Homepage of RentO" class = "home-link">RentO</a></h1>
        <h2>Sign In</h2>
      </div>
    </div>
    
    <div class = "main">
      <form name ="sign-in" action = "/action_page.php" onsubmit = "return validateForm()" method = "post" required>
        
        <label for = "email"><bold>Email Address</bold></label><br>
        <input type = "text" id = "email" name = "email" placeholder = "Ex. johnbradshaw@rento.com"><br><br>
        
        <label for = "password">Password</label><br>
        <input type = "password" id = "password" name = "password"><br>
        <i class="bi bi-eye-slash" id="togglePassword"></i>
        
        <p><a href = "forgot.html" title = "Forgot Passpword?" class = "forgot">Forgot your password?</a></p>
        <p><a href = "signup.html" title = "Create an Account" class = "signup">Don't have an account? Sign up!</a></p><br><br>
        
        <input type = "submit" value = "Login" class = "login-button">
        
      </form>
    </div>
    
    <footer class="footer">
      <div></div>
      <div>
        <span>&copy;</span>2022 RentO.com LLC
      </div>
      
      <div class = "link">
        <a href="terms.html" title="Terms and Policies" class = "terms">Terms &amp; Policies</a>
      </div>
      
      <div class = "link">
        <a href="privacy.html" title="Privacy Policy" class = "policies">Privacy Policy</a>
      </div>
      <div></div>
      
    </footer>
  </body>
</html>
